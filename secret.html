<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Quiz! 💖</title>
    <style>
        body {
            background: linear-gradient(135deg, #8b0000, #ff4d6d);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding: 30px 15px;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 25px 15px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; }

        .quiz-btn {
            display: block;
            width: 85%;
            margin: 10px auto;
            padding: 12px;
            background-color: white;
            color: #8b0000;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .result-box {
            display: none;
            margin-top: 20px;
            background: #fff;
            color: #d62828;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: underline;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Love Quiz! 💌</h1>
        <p>Answer this to read my secret message...</p>
        <hr style="border: 0.5px solid rgba(255,255,255,0.3); margin: 15px 0;">

        <!-- Quiz Question -->
        <p style="font-size: 1.1rem; font-weight: bold;">Who loves the other person more? 🤔</p>

        <button class="quiz-btn" onclick="wrongAnswer()">You do! 😜</button>
        <button class="quiz-btn" onclick="correctAnswer()">I do! (Obviously) 💖</button>
        <button class="quiz-btn" onclick="correctAnswer()">Equally 10000%! 🥰</button>

        <!-- Secret Result Box -->
        <div id="result" class="result-box">
            <p>🎉 CORRECT! 🎉</p>
            <p style="color: #333; font-weight: normal;">
                My Secret: You are literally the best thing that ever happened to me. Happy Birthday my love! I promise to always annoy you & love you forever! ❤️
            </p>
        </div>

        <br>
        <a href="index.html" class="back-btn">← Back to Main Card</a>
    </div>

    <script>
        function correctAnswer() {
            document.getElementById("result").style.display = "block";
        }
        function wrongAnswer() {
            alert("Wrong answer!! Try again 😜❤️");
        }
    </script>

</body>
</html>
